<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Slitherlink</title>
  <meta name="description" content="Gere e resolva o laço único — por dedução lógica. Jogo de Slitherlink no navegador." />
  <!-- prévia ao compartilhar (Open Graph / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://slitherlink.lucas.mat.br/" />
  <meta property="og:title" content="Slitherlink" />
  <meta property="og:description" content="Gere e resolva o laço único — por dedução lógica." />
  <meta property="og:image" content="https://slitherlink.lucas.mat.br/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Tabuleiro de Slitherlink com um laço azul" />
  <meta property="og:locale" content="pt_BR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Slitherlink" />
  <meta name="twitter:description" content="Gere e resolva o laço único — por dedução lógica." />
  <meta name="twitter:image" content="https://slitherlink.lucas.mat.br/og-image.png" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#171a21" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="icons/apple-touch.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Slitherlink" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Slitherlink</div>

    <div class="group">
      <label>Linhas
        <input id="linhas" type="number" min="3" value="7" />
      </label>
      <label>Colunas
        <input id="colunas" type="number" min="3" value="7" />
      </label>
      <label>Semente
        <input id="semente" type="text" value="slither" size="8" placeholder="(aleatória)" />
      </label>
      <label class="check" title="Sempre gerar com semente aleatória">
        <input id="aleatorio" type="checkbox" checked /> aleatória
      </label>
      <label>Dificuldade
        <select id="dificuldade">
          <option value="nenhuma">Nenhuma (todas as dicas)</option>
          <option value="facil">Fácil</option>
          <option value="medio" selected>Médio</option>
          <option value="dificil">Difícil</option>
        </select>
      </label>
      <label>Método
        <select id="metodo" title="Algoritmo de redução de dicas">
          <option value="guloso" selected>Guloso (mínimo)</option>
          <option value="binaria">Busca binária (rápido)</option>
          <option value="cegar">CEGAR (menos dicas)</option>
        </select>
      </label>
      <button id="gerar" class="primary">Gerar tabuleiro</button>
    </div>

    <div class="group">
      <button id="resolver" title="Resolver com animação">▶ Resolver</button>
      <select id="modoSolve" title="Como o solver resolve">
        <option value="deducao" selected>dedução</option>
        <option value="busca">busca real</option>
      </select>
      <label class="vel" title="Velocidade da animação do solver (passos por segundo)">
        <span>Velocidade <b id="velVal">15/s</b></span>
        <input id="velocidade" type="range" min="2" max="120" step="1" value="15" />
      </label>
      <button id="desfazer" title="Desfazer (Ctrl+Z)">↶ Desfazer</button>
      <button id="refazer" title="Refazer (Ctrl+Y)">↷ Refazer</button>
      <button id="limpar" title="Limpar tudo">Limpar</button>
    </div>

    <div class="group">
      <button id="exportar">Exportar CSV</button>
      <button id="importar">Importar CSV</button>
      <input id="arquivo" type="file" accept=".csv" hidden />
    </div>
  </header>

  <button id="toggleTop" class="toggle-top" title="Ocultar a barra">▴</button>

  <main id="palco">
    <div id="scroll" class="scroll">
      <svg id="tabuleiro" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div id="status" class="status floating-top"></div>

    <div id="minimap" class="minimap oculto">
      <div class="mini-grip" title="Arraste para mover o mapa">⠿</div>
      <svg id="miniSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="checkpoints floating-bl" title="Salve até 5 estados do tabuleiro e volte a eles">
      <span class="ckgroup">Salvar:
        <button data-save="0">1</button><button data-save="1">2</button><button data-save="2">3</button><button data-save="3">4</button><button data-save="4">5</button>
      </span>
      <span class="ckgroup">Carregar:
        <button data-load="0" disabled>1</button><button data-load="1" disabled>2</button><button data-load="2" disabled>3</button><button data-load="3" disabled>4</button><button data-load="4" disabled>5</button>
      </span>
      <span id="infoPuzzle" class="info"></span>
    </div>

    <div class="zoombar floating-br">
      <button id="zoomOut" title="Diminuir (Ctrl -)">−</button>
      <span id="zoomPct">100%</span>
      <button id="zoomIn" title="Aumentar (Ctrl +)">+</button>
      <button id="zoomFit" title="Ajustar à tela (Ctrl 0)">Ajustar</button>
    </div>

    <div id="overlay" class="overlay oculto"><div class="spinner"></div><span id="overlayTexto">Gerando…</span></div>
  </main>

  <script src="js/core.js?v=19"></script>
  <script src="js/game.js?v=19"></script>
  <script>
    // registra o service worker (PWA: instalável + offline)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
